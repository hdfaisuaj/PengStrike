# ============================================================
# PengStrike — Nginx 前端静态文件服务 + API 反向代理
# 用于生产环境托管编译后的 Vue3 前端
# ============================================================
server {
    listen 80;
    server_name _;

    # ---- 字符集 ----
    charset utf-8;

    # ---- 前端静态文件 ----
    root /usr/share/nginx/html;
    index index.html;

    # ============================================================
    # Gzip 压缩
    # ============================================================
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/octet-stream
        image/svg+xml
        font/woff
        font/woff2;

    gzip_vary on;
    gzip_proxied any;
    gzip_disable "msie6";

    # ============================================================
    # 缓存控制
    # ============================================================
    # 静态资源 — 长缓存 (文件指纹由 Vite 生成)
    location ~* \.(?:css|js|mjs|json|map)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # 字体和图片 — 长缓存
    location ~* \.(?:woff|woff2|ttf|eot|otf|svg|ico|png|jpg|jpeg|gif|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML 文件 — 不缓存 (确保每次获取最新版本)
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
    }

    # ============================================================
    # API 反向代理 → 后端 FastAPI 服务
    # ============================================================
    location /api/ {
        proxy_pass http://pengstrike-api:8000/api/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
        proxy_send_timeout 60s;

        # 缓冲
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;

        # 禁用缓存 (API 响应需要实时)
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ============================================================
    # WebSocket 代理 (用于日志流、实时状态等)
    # ============================================================
    location /api/ws {
        proxy_pass http://pengstrike-api:8000/api/ws;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket 长连接超时
        proxy_read_timeout 86400s;
    }

    # ============================================================
    # SPA 路由回退 — 所有非文件、非 API 请求返回 index.html
    # ============================================================
    location / {
        try_files $uri $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # ============================================================
    # 安全相关头
    # ============================================================
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}